name: CI – Backend

on:
  push:
    branches: [master, main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth-service, movie-service, booking-service, notification-service, gateway-service]
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cineverse
          POSTGRES_PASSWORD: cineverse123
          POSTGRES_DB: cineverse
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: cineverse
          MONGO_INITDB_ROOT_PASSWORD: cineverse123
        ports: ["27017:27017"]
        options: --health-cmd "mongosh --eval \"db.adminCommand('ping')\"" --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-alpine
        env:
          RABBITMQ_DEFAULT_USER: cineverse
          RABBITMQ_DEFAULT_PASS: cineverse123
        ports: ["5672:5672"]
        options: --health-cmd "rabbitmq-diagnostics ping" --health-interval 15s --health-timeout 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build & Test – ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cineverse
          SPRING_DATASOURCE_USERNAME: cineverse
          SPRING_DATASOURCE_PASSWORD: cineverse123
          SPRING_DATA_MONGODB_URI: mongodb://cineverse:cineverse123@localhost:27017/cineverse?authSource=admin
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_DATA_REDIS_PASSWORD: ""
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: cineverse
          SPRING_RABBITMQ_PASSWORD: cineverse123
          JWT_SECRET: ci-test-secret-key-at-least-256-bits-long-for-testing-only
        run: mvn -B test -q

      - name: Package (skip tests – already ran above)
        working-directory: backend/${{ matrix.service }}
        run: mvn -B package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: backend/${{ matrix.service }}/target/*.jar
          retention-days: 7
