server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Public — no JWT required
        - id: auth-public
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/register, /auth/login

        # Protected auth endpoints
        - id: auth-protected
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
          filters:
            - name: JwtAuthGatewayFilter

        # Movie service — public GETs
        - id: movie-service-public
          uri: ${MOVIE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/movies/**, /genres/**, /shows/**
            - Method=GET

        # Movie service — protected writes
        - id: movie-service-protected
          uri: ${MOVIE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/movies/**, /genres/**, /shows/**
            - Method=POST,PUT,DELETE,PATCH
          filters:
            - name: JwtAuthGatewayFilter

        # Booking service — always protected
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/bookings/**, /seats/**
          filters:
            - name: JwtAuthGatewayFilter

        # Notification service — always protected
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/notifications/**
          filters:
            - name: JwtAuthGatewayFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - ${CORS_ALLOWED_ORIGIN:}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-at-least-256-bits}

management:
  endpoints:
    web:
      exposure:
        include: health,info
