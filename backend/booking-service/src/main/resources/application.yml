server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cineverse}
    username: ${SPRING_DATASOURCE_USERNAME:cineverse}
    password: ${SPRING_DATASOURCE_PASSWORD:cineverse123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:cineverse123}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:cineverse}
    password: ${SPRING_RABBITMQ_PASSWORD:cineverse123}

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-at-least-256-bits}

rabbitmq:
  exchange: cineverse.events
  queues:
    booking-created: booking.created
    booking-cancelled: booking.cancelled

# Seat lock TTL in seconds (5 minutes)
seat:
  lock:
    ttl: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info
